<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Top half — red -->
  <path d="M 2 16 A 14 14 0 0 1 30 16 Z" fill="#dc2626"/>
  <!-- Bottom half — light -->
  <path d="M 2 16 A 14 14 0 0 0 30 16 Z" fill="#f4f4f5"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" stroke="#18181b" stroke-width="2" fill="none"/>
  <!-- Dividing line — left segment -->
  <line x1="2" y1="16" x2="10.5" y2="16" stroke="#18181b" stroke-width="2"/>
  <!-- Dividing line — right segment -->
  <line x1="21.5" y1="16" x2="30" y2="16" stroke="#18181b" stroke-width="2"/>
  <!-- Centre button ring -->
  <circle cx="16" cy="16" r="4" fill="#f4f4f5" stroke="#18181b" stroke-width="2"/>
  <!-- Centre dot -->
  <circle cx="16" cy="16" r="1.5" fill="#18181b"/>
</svg>
